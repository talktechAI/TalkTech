name = "talktech-next-on-pages"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Environment variables for production
[env.production.vars]
NODE_ENV = "production"
SITE_ORIGIN = "https://yourdomain.com"  # Replace with your actual domain
RATE_LIMIT_WINDOW_SECS = "60"
RATE_LIMIT_MAX = "5"

# KV binding for rate limiting (optional but recommended)
[[env.production.kv_namespaces]]
binding = "TALKTECH_KV"
id = "your_kv_namespace_id"  # Create this in Cloudflare dashboard
preview_id = "your_preview_kv_namespace_id"

# D1 database binding for storing contacts
[[env.production.d1_databases]]
binding = "TALKTECH_DB"
database_name = "talktech-db"  # Create this: wrangler d1 create talktech-db
database_id = "your_database_id"  # Will be provided after creating

# Secrets (set these with: wrangler secret put TURNSTILE_SECRET --env production)
# TURNSTILE_SECRET = "your_turnstile_secret"
# RESEND_API_KEY = "your_resend_api_key"
# NOTIFICATION_EMAIL = "your@email.com"

# Development environment (optional)
[env.development]
compatibility_flags = ["nodejs_compat"]

[env.development.vars]
NODE_ENV = "development"
SITE_ORIGIN = "http://localhost:3000"

# Development bindings (create separate dev resources)
[[env.development.kv_namespaces]]
binding = "TALKTECH_KV"
id = "your_dev_kv_namespace_id"
preview_id = "your_dev_kv_namespace_id"

[[env.development.d1_databases]]
binding = "TALKTECH_DB"
database_name = "talktech-db-dev"
database_id = "your_dev_database_id"
