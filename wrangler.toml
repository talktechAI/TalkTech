name = "talktech-next-on-pages"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = ".vercel/output/static"

# Production environment
[env.production.vars]
SITE_ORIGIN = "https://your-domain.com"  # ✅ Safe - public domain
RATE_LIMIT_WINDOW_SECS = "60"            # ✅ Safe - just a number
RATE_LIMIT_MAX = "5"                     # ✅ Safe - just a number

# Database binding
[[env.production.d1_databases]]
binding = "TALKTECH_DB"
database_name = "talktech-db"
database_id = "your-database-id-here"    # ✅ Safe - not a secret

# KV binding (optional)
[[env.production.kv_namespaces]]
binding = "TALKTECH_KV"
id = "your-kv-namespace-id"              # ✅ Safe - not a secret

# Preview environment (for staging/testing)
[env.preview.vars]
SITE_ORIGIN = "https://your-domain.pages.dev"  # Preview domain
RATE_LIMIT_WINDOW_SECS = "60"
RATE_LIMIT_MAX = "10"                           # More lenient for testing

# Preview database (optional - can use same as production for testing)
[[env.preview.d1_databases]]
binding = "TALKTECH_DB"
database_name = "talktech-db"
database_id = "your-database-id-here"

# 🔐 SECRETS ARE MANAGED SEPARATELY - NEVER IN THIS FILE!
# Use these commands to set secrets securely:
#   wrangler secret put TURNSTILE_SECRET_KEY --env production
#   wrangler secret put CF_CONTACT_WEBHOOK --env production
#
# For preview environment:
#   wrangler secret put TURNSTILE_SECRET_KEY --env preview
